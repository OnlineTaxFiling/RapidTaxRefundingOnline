name: Chameleon Expansion
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: pip install requests PyGithub

      - name: Run Monster Expansion
        env:
          CHAMELEON_TOKEN: ${{ secrets.CHAMELEON_TOKEN }}
        run: python master_expander.py

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Automated Update $(date)"
