name: SkyScanner Auto-Propulsion
on:
  push:
    branches:
      - main
  workflow_dispatch:

# Added this to silence the Node.js 20 deprecation warning
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # This gives GitHub permission to save the files it creates
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4.2.2 # Specifically the Node 24 compatible patch

      - name: Setup Node.js
        uses: actions/setup-node@v4.1.0 # Specifically the Node 24 compatible patch
        with:
          node-version: '20' # Your engine still runs on 20, which is fine

      - name: Create Required Folders
        run: mkdir -p states blog # Keeps your folder logic safe

      - name: Run SkyScanner Engine
        run: node generate.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Auto-generated state and blog pages [Skip CI]" || exit 0
          git push
