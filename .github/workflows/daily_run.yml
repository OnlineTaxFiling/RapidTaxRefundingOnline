name: Chameleon Expansion
on:
  schedule:
    # Runs every 6 hours to maximize "Freshness" for the April 15 deadline
    - cron: '0 */6 * * *' 
  workflow_dispatch:      # Allows you to trigger a "Monster Update" manually

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install requests PyGithub

      - name: Run Monster Expansion
        env:
          # Required for the script to push content to your other repos
          CHAMELEON_TOKEN: ${{ secrets.CHAMELEON_TOKEN }}
        run: python master_expander.py

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Daily Authority Update: $(date)"
          branch: main
