name: Chameleon Expansion

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    # Added explicit permissions to ensure the GITHUB_TOKEN can push code
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyGithub

      - name: Run Monster Expansion
        env:
          CHAMELEON_TOKEN: ${{ secrets.CHAMELEON_TOKEN }}
        # Added a check to ensure the script exists before running
        run: |
          if [ -f master_expander.py ]; then
            python master_expander.py
          else
            echo "Error: master_expander.py not found!"
            exit 1
          fi

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Authority Update [skip ci]"
          branch: main
          # This prevents the action from failing if the script made no changes
          skip_dirty_check: false 
          commit_options: '--no-verify'
