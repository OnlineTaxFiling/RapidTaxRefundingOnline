name: Chameleon Expansion

on:
  schedule:
    - cron: '0 */6 * * *' 
  workflow_dispatch:      

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    # This forces GitHub to use Node 24 for the underlying action execution
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests PyGithub

      - name: Run Monster Expansion
        env:
          CHAMELEON_TOKEN: ${{ secrets.CHAMELEON_TOKEN }}
        run: python master_expander.py

      - name: Commit and Push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated Authority Update (Forced Node 24) [skip ci]"
          branch: main
